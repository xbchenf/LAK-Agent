# =============================================================================
# LAK-Agent — 开发环境配置
# =============================================================================

spring:
  # ---- MySQL 8.0 — 业务数据 + 审计日志 ----
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/lak_ai_platform?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:lak_user}
    password: ${MYSQL_PASSWORD:lak_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---- Redis 7 — 会话 + 限流 ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # ---- Flyway 数据库迁移 ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  # ---- SpringDoc — 开发环境启用 ----
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

# ---- 日志 — 开发环境 DEBUG ----
logging:
  level:
    com.lak.ai: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# ---- 开发环境特有配置 ----
lak:
  cors:
    allowed-origins: http://localhost:5173  # Vite dev server
  sensitive-words:
    path: config/sensitive-words.txt
